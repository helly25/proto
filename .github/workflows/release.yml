name: Release
on:
  push:
    tags:
      # Numeric semver only (e.g. 1.2.1); releases are <num>.<num>.<num>. This
      # is stricter than "*.*.*", which also matches things like "v1.2.x".
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    uses: bazel-contrib/.github/.github/workflows/release_ruleset.yaml@v7
    permissions:
      contents: write
    with:
      release_files: proto-*.tar.gz
      prerelease: true

  # Mirror the release to the Bazel Central Registry (replaces the retired
  # publish-to-bcr GitHub App). See .github/workflows/publish.yaml.
  publish:
    needs: release
    # Grant what publish.yaml's job requests; a called workflow cannot exceed
    # the caller's permissions.
    permissions:
      contents: write
    uses: ./.github/workflows/publish.yaml
    with:
      tag_name: ${{ github.ref_name }}
    secrets:
      BCR_PUBLISH_TOKEN: ${{ secrets.BCR_PUBLISH_TOKEN }}
