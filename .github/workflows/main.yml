name: Test
# Branches only — release tags are handled by release.yml. Running this on tag
# pushes fires the full matrix needlessly.
on:
  push:
    branches: ["**"]

permissions: read-all

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: pre-commit/action@v3.0.1
      - uses: pre-commit-ci/lite-action@v1.0.2
        if: always()

  test-gcc:
    needs: pre-commit
    secrets: inherit
    strategy:
      matrix:
        os: [ubuntu-latest]
        compiler: [gcc]
        gcc_version: [13, 14]
        bazel_config: [asan, cpp23, opt]
        # Using `include` does not make the options show up in the generated config names...
        exclude:
          - bazel_config: asan
            gcc_version: 13
          - bazel_config: cpp23
            gcc_version: 13

    uses: ./.github/workflows/test.yml
    with:
      continue-on-error: false
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}
      gcc_version: ${{ matrix.gcc_version }}
      bazel_config: ${{ matrix.bazel_config }}

  test-bcr:
    needs: [pre-commit, test-gcc]
    secrets: inherit
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, native, clang]
        gcc_version: [13]
        llvm_version: [20.1.8]
        bazel_config: [opt]
        # Bazel-version compatibility rungs, crossed with the os/compiler combos
        # below. The floor is 8.x: the checked-in default protobuf (34.1) no longer
        # analyzes on Bazel 7.x, so 8.7.0 is the lowest we support. Plus the latest
        # 9.0.x (9.0.2) and the checked-in default 9.1.1.
        bazel_version: [8.7.0, 9.0.2, 9.1.1]
        exclude:
          - os: ubuntu-latest
            compiler: native
          - os: macos-latest
            compiler: gcc

    uses: ./.github/workflows/test.yml
    with:
      continue-on-error: false
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}
      gcc_version: ${{ matrix.gcc_version }}
      llvm_version: ${{ matrix.llvm_version }}
      bazel_config: ${{ matrix.bazel_config }}
      bazel_version: ${{ matrix.bazel_version }}

  test-clang:
    needs: [pre-commit, test-gcc, test-bcr]
    secrets: inherit
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [clang]
        # Hermetic toolchains_llvm clang (independent of the runner's Apple clang).
        # Ladder: working default (20), macOS native match (21 = Apple clang 21), newest (22).
        llvm_version: [20.1.8, 21.1.8, 22.1.7]
        bazel_config: [asan, cpp23, fastbuild, opt]
        exclude:
          # macOS asan works via toolchains_llvm's @loader_path rpath fix for the
          # sanitizer runtime dylib (helly25 fork; upstream PR #769), on LLVM
          # 22.1.7. 20.1.8 still hangs in compiler-rt FindDynamicShadowStart on
          # macOS, so exclude only that combo; macOS asan rides the 22.1.7 rung.
          - os: macos-latest
            llvm_version: 20.1.8
            bazel_config: asan
          # 20.1.8 is the default pin -> full config coverage
          # 21.1.8 less coverage, just check opt
          # 22.1.7 keep the complex configs, just drop fastbuild
          - llvm_version: 21.1.8
            bazel_config: asan
          - llvm_version: 21.1.8
            bazel_config: cpp23
          - llvm_version: 21.1.8
            bazel_config: fastbuild
          - llvm_version: 22.1.7
            bazel_config: fastbuild

    uses: ./.github/workflows/test.yml
    with:
      continue-on-error: true
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}
      llvm_version: ${{ matrix.llvm_version }}
      bazel_config: ${{ matrix.bazel_config }}

  test-proto:
    needs: [pre-commit, test-gcc]
    secrets: inherit
    strategy:
      matrix:
        os: [ubuntu-latest]
        compiler: [clang]
        llvm_version: [20.1.8]
        bazel_config: [opt]
        # protobuf back/forward-compatibility, all built with the checked-in Bazel
        # 9.1.1. 34.1 is the checked-in default; 32.1/33.6 verify older releases
        # still build against our pinned (newer) deps; 35.0 is the newest release
        # (it requires Bazel >= 8, which is why it cannot be the default while we
        # still want a low Bazel floor).
        proto_version: ["32.1", "33.6", "34.1", "35.0"]

    uses: ./.github/workflows/test.yml
    with:
      continue-on-error: true
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}
      llvm_version: ${{ matrix.llvm_version }}
      bazel_config: ${{ matrix.bazel_config }}
      proto_version: ${{ matrix.proto_version }}

  done:
    needs: [pre-commit, test-gcc, test-clang, test-bcr, test-proto]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ensure every job is wired into this gate
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          # Parse the workflow with a real YAML reader (yq) and fail if any
          # declared job (other than this gate) is absent from `needs` above, so
          # a newly added job cannot silently escape the required gate.
          declared="$(yq '.jobs | keys | .[]' .github/workflows/main.yml |
            grep -vx done | sort)"
          wired="$(jq -r 'keys[]' <<<"${NEEDS_JSON}" | sort)"
          missing="$(comm -23 <(printf '%s\n' "${declared}") <(printf '%s\n' "${wired}"))"
          if [[ -n "${missing}" ]]; then
            echo "Jobs declared in the workflow but missing from done.needs:"
            while read -r job; do
              echo "  - ${job}"
              echo "::error title=Gate is missing a job::${job} not in done.needs"
            done <<<"${missing}"
            exit 1
          fi
          echo "done covers all $(grep -c . <<<"${declared}") workflow jobs."
      - name: Fail if any dependency did not succeed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
